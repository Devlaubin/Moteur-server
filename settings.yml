# SearXNG configuration — optimisé pour usage API

general:
  debug: false
  instance_name: "MonMoteur"
  privacypolicy_url: ""
  donation_url: ""
  contact_url: ""
  enable_metrics: false

brand:
  new_issue_url: ""
  docs_url: ""
  public_instances: ""
  wiki_url: ""
  issue_url: ""

search:
  safe_search: 0
  autocomplete: "google"
  autocomplete_min: 2
  default_lang: "fr"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 86400
    SearxEngineCaptcha: 86400
    SearxEngineTooManyRequests: 3600
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "${SEARXNG_SECRET_KEY}"
  base_url: "${SEARXNG_BASE_URL}"
  image_proxy: true
  http_protocol_version: "1.0"
  method: "POST"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

redis:
  url: ""

ui:
  static_use_hash: true
  default_locale: "fr"
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: auto

# CORS ouvert pour appels depuis le navigateur
outgoing:
  request_timeout: 6.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false

  - name: bing
    engine: bing
    shortcut: bi

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    base_url: "https://fr.wikipedia.org/"

  - name: google images
    engine: google_images
    shortcut: gimg

  - name: bing images
    engine: bing_images
    shortcut: bimg

  - name: google news
    engine: google_news
    shortcut: gnews

  - name: bing news
    engine: bing_news
    shortcut: bnews

  - name: google videos
    engine: google_videos
    shortcut: gvid

  - name: youtube
    engine: youtube_noapi
    shortcut: yt

  - name: github
    engine: github
    shortcut: gh

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so

locales:
  fr: Français
  en: English

doi_resolvers:
  oadoi.org: "https://oadoi.org/"

default_doi_resolver: "oadoi.org"
